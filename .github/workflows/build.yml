name: Build and Package node-jquery

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python 2 (needed by node-gyp for native addons)
        run: |
          sudo apt-get update
          sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/local/bin/python

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '0.10'

      - name: Install dependencies
        run: npm install --registry=https://seal:2012-09-20T00:00:00.000Z@time-machines-npm.sealsecurity.io/ --loglevel http --python=/usr/bin/python2

      - name: Run tests
        run: ./node_modules/.bin/grunt test

      # Copy to tmp/jquery.js to match the public artifact structure
      - name: Copy jQuery source to tmp
        run: mkdir -p tmp && cp lib/node-jquery.js tmp/jquery.js

      - name: Package tarball
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: node-jquery-package
          path: "*.tgz"
