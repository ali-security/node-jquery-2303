name: Build and Package node-jquery

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '0.10'

      - name: Install dependencies
        run: npm install --registry=https://seal:2012-09-20T00:00:00.000Z@time-machines-npm.sealsecurity.io/ --loglevel http

      - name: Run tests
        run: ./node_modules/.bin/grunt test
        continue-on-error: true

      - name: Package tarball
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: node-jquery-package
          path: "*.tgz"
